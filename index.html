<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Siroh | Ultimate AI CV Builder</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&family=Playfair+Display:wght@700&display=swap');
        body { background-color: #020617; color: #f8fafc; font-family: 'Inter', sans-serif; overflow-x: hidden; }
        .theme-cyan { --primary: #22d3ee; }
        .text-theme { color: var(--primary); }
        .bg-theme { background-color: var(--primary); }
        .border-theme { border-color: var(--primary); }

        .cv-paper { 
            background: white; color: #1e293b; min-height: 29.7cm; width: 21cm; 
            padding: 1.5cm; box-shadow: 0 0 40px rgba(0,0,0,0.8); margin: 0 auto; 
            font-family: "Times New Roman", Times, serif; transform: scale(0.75); transform-origin: top center;
            transition: all 0.3s ease; position: relative;
        }

        .score-gradient { background: conic-gradient(var(--primary) calc(var(--percent) * 1%), #1e293b 0); }

        /* Template Specific Adjustments */
        .template-modern { display: grid; grid-template-columns: 1fr 2fr; gap: 1cm; }
        .template-executive { text-align: center; }
        .template-executive .section-head { border-top: 1.5pt solid #1e293b; border-bottom: 1.5pt solid #1e293b; padding: 4px 0; margin-bottom: 10px; }

        @media print {
            body { background: white; }
            nav, .editor-panel, .no-print { display: none !important; }
            .preview-panel { width: 100% !important; padding: 0 !important; }
            .cv-paper { transform: scale(1); margin: 0; box-shadow: none; width: 100%; height: 100%; }
        }
        .custom-scrollbar::-webkit-scrollbar { width: 4px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #334155; border-radius: 10px; }
    </style>
</head>
<body class="theme-cyan">

    <nav class="sticky top-0 z-50 bg-[#020617]/95 backdrop-blur-md p-4 border-b border-slate-800">
        <div class="flex justify-between items-center max-w-[1800px] mx-auto">
            <div class="text-2xl font-black tracking-tighter text-white">SIROH<span class="text-cyan-400">.</span></div>
            
            <div class="flex items-center gap-4">
                <select id="templateSelect" onchange="renderCV()" class="bg-slate-900 text-[10px] uppercase font-bold text-white border border-slate-700 px-4 py-2 rounded-full outline-none focus:border-cyan-400">
                    <option value="classic">Standard Classic</option>
                    <option value="modern">Modern Sidebar</option>
                    <option value="executive">Executive Serif</option>
                </select>

                <div class="flex items-center gap-3 bg-slate-900 px-4 py-2 rounded-full border border-slate-800">
                    <div id="scoreCircle" class="size-8 rounded-full flex items-center justify-center text-[9px] font-bold score-gradient" style="--percent: 0">
                        <div class="size-6 bg-slate-900 rounded-full flex items-center justify-center" id="scoreValue">0%</div>
                    </div>
                    <span class="text-[9px] font-bold text-slate-400 uppercase hidden md:block">ATS Match</span>
                </div>
                <button onclick="window.print()" class="bg-cyan-500 text-slate-950 px-6 py-2 rounded-full font-bold text-sm hover:bg-white transition shadow-lg shadow-cyan-500/20">Download PDF</button>
            </div>
        </div>
    </nav>

    <main class="py-6 px-4 max-w-[1800px] mx-auto grid lg:grid-cols-2 gap-8">
        
        <div class="editor-panel space-y-6 max-h-[88vh] overflow-y-auto pr-4 custom-scrollbar">
            
            <div class="bg-slate-900 p-6 rounded-3xl border border-slate-800">
                <div class="flex justify-between items-center mb-4">
                    <h3 class="text-xs font-bold uppercase tracking-widest text-slate-500">Candidate Identity</h3>
                    <i class="fas fa-fingerprint text-theme"></i>
                </div>
                <input type="text" id="userName" oninput="renderCV()" placeholder="Full Name (e.g. Edwin Siro)" class="w-full bg-transparent text-2xl font-bold border-b border-slate-800 mb-6 outline-none focus:border-theme py-2">
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <div class="relative">
                        <i class="fas fa-envelope absolute left-3 top-4 text-slate-600 text-xs"></i>
                        <input type="text" id="userEmail" oninput="renderCV()" placeholder="Email Address" class="w-full bg-slate-950 p-3 pl-10 rounded-xl border border-slate-800 text-sm outline-none">
                    </div>
                    <div class="relative">
                        <i class="fas fa-phone absolute left-3 top-4 text-slate-600 text-xs"></i>
                        <input type="text" id="userPhone" oninput="renderCV()" placeholder="Phone Number" class="w-full bg-slate-950 p-3 pl-10 rounded-xl border border-slate-800 text-sm outline-none">
                    </div>
                </div>
            </div>

            <div class="bg-slate-900 p-6 rounded-3xl border border-slate-800 border-l-4 border-l-cyan-500 shadow-xl">
                <div class="flex justify-between items-center mb-3">
                    <h3 class="text-theme font-bold text-xs uppercase tracking-widest">AI Target Engine</h3>
                    <span class="text-[10px] text-slate-500">Paste JD to optimize</span>
                </div>
                <textarea id="targetJob" oninput="updateATSScore()" class="w-full bg-slate-950 border border-slate-800 rounded-xl p-3 text-slate-300 text-xs outline-none focus:border-theme mb-3" rows="3" placeholder="Paste the job description requirements here..."></textarea>
                <div class="grid grid-cols-2 gap-2">
                    <button onclick="suggestSkillsAI()" class="bg-slate-800 hover:bg-slate-700 text-white py-2 rounded-xl text-[10px] font-bold transition">AUTO-GENERATE SKILLS</button>
                    <button onclick="addSection('Professional Summary', 'Write a brief...', 'Summarize my career highlights for this specific job role.')" class="bg-slate-800 hover:bg-slate-700 text-white py-2 rounded-xl text-[10px] font-bold transition">GENERATE SUMMARY</button>
                </div>
            </div>

            <div class="grid grid-cols-2 md:grid-cols-4 gap-2 no-print">
                <button onclick="addSection('Work Experience', 'Job Title | Company\nJan 2022 - Present\n• Task 1')" class="p-3 bg-slate-900 border border-slate-800 rounded-2xl text-[10px] font-bold hover:border-theme transition">EXP</button>
                <button onclick="addSection('Education', 'Degree Name\nUniversity | 2018 - 2021')" class="p-3 bg-slate-900 border border-slate-800 rounded-2xl text-[10px] font-bold hover:border-theme transition">EDU</button>
                <button onclick="addSection('Certifications', '• Certified AI Professional')" class="p-3 bg-slate-900 border border-slate-800 rounded-2xl text-[10px] font-bold hover:border-theme transition">CERT</button>
                <button onclick="addSection('Hobbies & Interests', '• Playing Chess\n• Open Source Coding')" class="p-3 bg-slate-900 border border-slate-800 rounded-2xl text-[10px] font-bold hover:border-theme transition">OTHER</button>
            </div>

            <div id="sectionContainer" class="space-y-4 pb-20"></div>
        </div>

        <div class="preview-panel hidden lg:block bg-[#0f172a] rounded-3xl p-4 border border-slate-800 overflow-hidden relative">
            <div id="cv-paper-preview" class="cv-paper"></div>
        </div>
    </main>

    <script>
        const API_KEY = "AIzaSyDlByDWoNQsNb0pGZKQTxqPeFkhQWr6Eqw"; 

        async function callGemini(prompt) {
            try {
                const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${API_KEY}`, {
                    method: "POST", headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }] })
                });
                const data = await res.json();
                return data.candidates[0].content.parts[0].text.trim();
            } catch (e) { return "AI Error: Check connection."; }
        }

        async function addSection(type, placeholder, aiPrompt = null) {
            const id = "sec-" + Date.now();
            let initialVal = "";
            
            if(aiPrompt) {
                const jd = document.getElementById('targetJob').value;
                initialVal = await callGemini(`${aiPrompt}. Job Context: ${jd}. Return only the content.`);
            }

            const html = `
                <div id="${id}" class="bg-slate-900 border border-slate-800 p-5 rounded-2xl relative group animate-fade-in shadow-xl">
                    <div class="flex justify-between items-center mb-2">
                        <input type="text" value="${type}" oninput="renderCV()" class="bg-transparent text-theme font-black text-[10px] uppercase outline-none tracking-widest">
                        <button onclick="document.getElementById('${id}').remove(); renderCV();" class="text-slate-600 hover:text-red-400"><i class="fas fa-times"></i></button>
                    </div>
                    <textarea oninput="renderCV(); updateATSScore();" class="content-input w-full bg-slate-950 border border-slate-800 rounded-xl p-3 text-slate-300 text-xs outline-none focus:border-theme min-h-[100px]">${initialVal}</textarea>
                    <div class="flex gap-2 mt-2 justify-end">
                        <button onclick="polishAI('${id}', '${type}')" class="bg-slate-800 text-theme px-3 py-1 rounded-lg text-[9px] font-bold border border-slate-700 hover:bg-theme hover:text-slate-950 transition">AI OPTIMIZE</button>
                    </div>
                </div>`;
            document.getElementById('sectionContainer').insertAdjacentHTML('beforeend', html);
            renderCV();
        }

        async function suggestSkillsAI() {
            const jd = document.getElementById('targetJob').value;
            if(!jd) return alert("Please paste a Job Description first!");
            const skills = await callGemini(`Extract 12 key skills (hard & soft) from this JD: ${jd}. Comma separated list.`);
            addSection('Technical & Soft Skills', 'Skills...', skills);
        }

        async function polishAI(id, type) {
            const area = document.querySelector(`#${id} textarea`);
            const btn = event.target;
            btn.innerText = "POLISHING...";
            const res = await callGemini(`Improve this CV section (${type}) for maximum ATS impact. Target Job: ${document.getElementById('targetJob').value}. Original Text: ${area.value}. Return ONLY the improved version with bullet points.`);
            area.value = res;
            renderCV(); updateATSScore();
            btn.innerText = "AI OPTIMIZE";
        }

        function updateATSScore() {
            const jd = document.getElementById('targetJob').value.toLowerCase();
            const cv = Array.from(document.querySelectorAll('.content-input')).map(i => i.value.toLowerCase()).join(' ');
            if(!jd || !cv) return;
            const keywords = jd.split(/\W+/).filter(w => w.length > 5);
            const hits = keywords.filter(w => cv.includes(w));
            const score = Math.min(Math.round((hits.length / keywords.length) * 100) + 15, 100);
            document.getElementById('scoreCircle').style.setProperty('--percent', score);
            document.getElementById('scoreValue').innerText = score + '%';
        }

        function renderCV() {
            const paper = document.getElementById('cv-paper-preview');
            const color = getComputedStyle(document.body).getPropertyValue('--primary');
            const template = document.getElementById('templateSelect').value;
            const name = document.getElementById('userName').value || 'NAME SURNAME';
            const email = document.getElementById('userEmail').value || 'email@example.com';
            const phone = document.getElementById('userPhone').value || '+254 000 000 000';
            
            const sections = Array.from(document.querySelectorAll('#sectionContainer > div')).map(div => ({
                title: div.querySelector('input').value,
                content: div.querySelector('textarea').value
            }));

            let html = "";

            if(template === 'modern') {
                const sidebarTitles = ['skills', 'education', 'hobbies', 'languages', 'certifications'];
                const sidebar = sections.filter(s => sidebarTitles.some(t => s.title.toLowerCase().includes(t)));
                const main = sections.filter(s => !sidebar.includes(s));
                
                html = `<div class="template-modern">
                    <div style="background: #f8fafc; margin: -1.5cm 0 -1.5cm -1.5cm; padding: 1.5cm 0.5cm; border-right: 1px solid #e2e8f0;">
                        <h1 style="color: ${color}; font-size: 18pt; font-weight: bold; line-height: 1;">${name}</h1>
                        <p style="font-size: 8pt; color: #64748b; margin: 10px 0 30px;">${email}<br>${phone}</p>
                        ${sidebar.map(s => `<h3 style="color: ${color}; font-size: 9pt; font-weight: bold; border-bottom: 1px solid ${color}; margin-top: 20px; text-transform: uppercase;">${s.title}</h3><p style="font-size: 8.5pt; line-height: 1.4; padding-top: 5px;">${s.content}</p>`).join('')}
                    </div>
                    <div>
                        ${main.map(s => `<h3 style="color: ${color}; font-size: 11pt; font-weight: bold; border-bottom: 2px solid ${color}; margin-top: 15px; text-transform: uppercase;">${s.title}</h3><div style="font-size: 10pt; white-space: pre-line; line-height: 1.5; padding-top: 5px;">${s.content}</div>`).join('')}
                    </div>
                </div>`;
            } else if (template === 'executive') {
                html = `<div class="template-executive">
                    <h1 style="font-family: 'Playfair Display', serif; font-size: 32pt; color: #0f172a; margin-bottom: 5px;">${name}</h1>
                    <p style="font-size: 10pt; letter-spacing: 3px; color: #64748b; margin-bottom: 40px; text-transform: uppercase;">${email} &bull; ${phone}</p>
                    ${sections.map(s => `<div style="margin-bottom: 25px;">
                        <h3 class="section-head" style="font-size: 12pt; font-weight: bold; color: #0f172a; text-transform: uppercase; letter-spacing: 2px;">${s.title}</h3>
                        <div style="font-size: 10.5pt; white-space: pre-line; line-height: 1.6;">${s.content}</div>
                    </div>`).join('')}
                </div>`;
            } else {
                html = `<div style="text-align: center; margin-bottom: 30px; border-bottom: 3px solid ${color}; padding-bottom: 20px;">
                    <h1 style="font-size: 28pt; font-weight: bold; color: #1e293b; text-transform: uppercase; margin: 0;">${name}</h1>
                    <p style="font-size: 11pt; color: ${color}; font-weight: bold; margin-top: 5px;">${email} | ${phone}</p>
                </div>
                ${sections.map(s => `<div style="margin-bottom: 20px;">
                    <h3 style="color: white; background: ${color}; padding: 4px 10px; font-size: 11pt; font-weight: bold; text-transform: uppercase; display: inline-block; margin-bottom: 8px;">${s.title}</h3>
                    <div style="font-size: 10.5pt; white-space: pre-line; line-height: 1.5; border-left: 2px solid #f1f5f9; padding-left: 15px;">${s.content}</div>
                </div>`).join('')}`;
            }
            paper.innerHTML = html;
        }

        // Initialize with default sections
        window.onload = () => {
            addSection('Professional Summary', 'High-level career overview...');
            addSection('Work Experience', 'Role | Company\nDates\n• Achievement');
        };
    </script>
</body>
</html>
