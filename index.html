<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Siroh Pro | Elite Career Engine</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        /* Added Lora for Academic Template */
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;800&family=Playfair+Display:wght@700&family=JetBrains+Mono&family=Lora:ital,wght@0,400;0,700;1,400&display=swap');
        
        :root { --primary: #10b981; --dark: #020617; }
        
        body { 
            background-color: var(--dark); 
            color: #f1f5f9; 
            font-family: 'Inter', sans-serif; 
            line-height: 1.6;
            -webkit-font-smoothing: antialiased;
        }

        .glass-card { 
            background: rgba(15, 23, 42, 0.6); 
            backdrop-filter: blur(12px); 
            border: 1px solid rgba(255,255,255,0.08); 
            border-radius: 1.5rem;
        }

        .page-section { display: none; padding: 2rem 0; }
        .page-section.active { display: block; animation: fadeIn 0.5s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .cv-container {
            perspective: 1000px;
            height: 800px;
            overflow-y: auto;
            border-radius: 1rem;
            background: #1e293b;
            padding: 2rem;
        }

        .cv-paper { 
            background: white; 
            color: #1e293b; 
            width: 210mm; 
            min-height: 297mm; 
            padding: 20mm; 
            margin: 0 auto; 
            box-shadow: 0 20px 50px rgba(0,0,0,0.3);
            transform: scale(0.65); 
            transform-origin: top center;
            transition: all 0.3s ease;
        }

        /* Template Style Definitions */
        .style-executive { font-family: 'Playfair Display', serif; border-top: 12px solid #0f172a; }
        .style-tech { font-family: 'JetBrains Mono', monospace; border: 2px solid #10b981; }
        .style-modern { border-left: 10px solid #10b981; }
        
        /* New Creative Style (Sidebar Layout) */
        .style-creative { display: grid; grid-template-columns: 1fr 2fr; gap: 30px; padding: 0 !important; }
        .style-creative .sidebar { background: #f8fafc; padding: 20mm 10mm; border-right: 1px solid #e2e8f0; height: 100%; }
        .style-creative .main-content { padding: 20mm 15mm 20mm 5mm; }

        /* New Academic Style (Serif Font) */
        .style-academic { font-family: 'Lora', serif; line-height: 1.4; padding: 25mm !important; }

        .btn-primary {
            background: var(--primary);
            color: #020617;
            font-weight: 700;
            padding: 0.75rem 1.5rem;
            border-radius: 0.75rem;
            transition: all 0.2s;
            text-transform: uppercase;
            font-size: 0.75rem;
            letter-spacing: 0.05em;
        }
        .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 10px 20px rgba(16, 185, 129, 0.2); }

        @media print { .no-print { display: none !important; } .cv-paper { transform: scale(1) !important; margin: 0; box-shadow: none; } }
    </style>
</head>
<body>

    <nav class="max-w-7xl mx-auto px-6 py-8 flex justify-between items-center no-print">
        <div class="flex items-center gap-3">
            <div class="bg-emerald-500 p-2 rounded-lg"><i class="fas fa-shield-bolt text-slate-900"></i></div>
            <span class="text-xl font-bold uppercase tracking-tight">Siroh <span class="text-emerald-500">Pro</span></span>
        </div>
        <div class="flex items-center gap-8 text-[11px] font-bold uppercase tracking-widest">
            <button onclick="showPage('page-landing')" class="hover:text-emerald-500">Home</button>
            <button onclick="showPage('page-builder')" class="btn-primary">Build CV</button>
        </div>
    </nav>

    <section id="page-landing" class="page-section active max-w-7xl mx-auto px-6">
        <div class="grid lg:grid-cols-2 gap-16 items-center pt-12">
            <div>
                <h1 class="text-5xl lg:text-7xl font-extrabold leading-[1.1] mb-6">
                    Engineering <br><span class="text-emerald-500 italic">Top 1%</span> Careers.
                </h1>
                <p class="text-slate-400 text-lg mb-10 max-w-lg leading-relaxed">
                    Automated CV design and AI-powered networking hooks for the Kenyan professional.
                </p>
                <div class="flex gap-4">
                    <button onclick="showPage('page-builder')" class="btn-primary px-10 py-5 text-sm">Launch Builder</button>
                </div>
            </div>
            <div class="glass-card p-8 rotate-2 border-emerald-500/20">
                <div class="space-y-4">
                    <div class="h-4 bg-slate-800 rounded w-3/4"></div>
                    <div class="h-20 bg-emerald-500/10 rounded border border-emerald-500/20"></div>
                </div>
            </div>
        </div>
    </section>

    <section id="page-builder" class="page-section max-w-[1600px] mx-auto px-6">
        <div class="grid lg:grid-cols-12 gap-8">
            <div class="lg:col-span-5 space-y-6">
                <div class="glass-card p-8 space-y-4">
                    <h3 class="text-xs font-bold uppercase tracking-[0.2em] text-emerald-500 mb-4">Design Control</h3>
                    <input type="text" id="userName" placeholder="Full Name" oninput="renderCV()" class="w-full bg-slate-900/50 border border-slate-800 rounded-lg p-4 text-sm focus:border-emerald-500 outline-none transition">
                    <input type="text" id="userLoc" placeholder="Nairobi, Kenya" oninput="renderCV()" class="w-full bg-slate-900/50 border border-slate-800 rounded-lg p-4 text-sm focus:border-emerald-500 outline-none transition">
                    
                    <div class="grid grid-cols-2 gap-2">
                        <button onclick="applyStyle('modern')" class="bg-slate-800 py-3 rounded-lg text-[9px] font-bold uppercase hover:bg-emerald-500 transition">Modern</button>
                        <button onclick="applyStyle('executive')" class="bg-slate-800 py-3 rounded-lg text-[9px] font-bold uppercase hover:bg-emerald-500 transition">Executive</button>
                        <button onclick="applyStyle('creative')" class="bg-slate-800 py-3 rounded-lg text-[9px] font-bold uppercase hover:bg-emerald-500 transition">Creative</button>
                        <button onclick="applyStyle('academic')" class="bg-slate-800 py-3 rounded-lg text-[9px] font-bold uppercase hover:bg-emerald-500 transition">Academic</button>
                    </div>

                    <button onclick="addExp()" class="btn-primary w-full py-4">Generate AI Experience</button>
                </div>
                <div id="expList" class="space-y-4"></div>
            </div>

            <div class="lg:col-span-7">
                <div class="sticky top-6">
                    <div class="cv-container">
                        <div id="cv-preview" class="cv-paper style-modern"></div>
                    </div>
                </div>
            </div>
        </div>
    </section>

    <script>
        const API_KEY = "AIzaSyDlByDWoNQsNb0pGZKQTxqPeFkhQWr6Eqw";

        function showPage(id) {
            document.querySelectorAll('.page-section').forEach(s => s.classList.remove('active'));
            document.getElementById(id).classList.add('active');
        }

        async function callAI(p) {
            const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${API_KEY}`, {
                method: "POST", headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ contents: [{ parts: [{ text: p }] }] })
            });
            const data = await res.json();
            return data.candidates[0].content.parts[0].text.trim();
        }

        function applyStyle(s) {
            document.getElementById('cv-preview').className = 'cv-paper style-' + s;
            renderCV();
        }

        async function addExp() {
            const val = await callAI("Generate 1 elite CV experience block for a role in Nairobi. Use metrics.");
            const id = "exp-" + Date.now();
            document.getElementById('expList').insertAdjacentHTML('afterbegin', `<div id="${id}" class="glass-card p-4"><textarea oninput="renderCV()" class="w-full bg-transparent text-slate-400 text-xs min-h-[100px] outline-none">${val}</textarea></div>`);
            renderCV();
        }

        function renderCV() {
            const n = document.getElementById('userName').value || 'PROFESSIONAL NAME';
            const l = document.getElementById('userLoc').value || 'CITY, COUNTRY';
            const preview = document.getElementById('cv-preview');
            const isCreative = preview.classList.contains('style-creative');
            
            let c = "";
            document.querySelectorAll('#expList textarea').forEach(t => c += `<div style="margin-bottom:12pt; font-size:10pt; line-height:1.4; white-space:pre-line;">${t.value}</div>`);

            if (isCreative) {
                // Modified for Creative Sidebar Layout
                preview.innerHTML = `
                    <div class="sidebar">
                        <h1 style="font-size: 18pt; font-weight: 800; line-height: 1.1; margin-bottom: 8pt;">${n}</h1>
                        <p style="color: #10b981; font-weight: 700; font-size: 9pt;">${l}</p>
                    </div>
                    <div class="main-content">
                        <h2 style="font-size: 11pt; text-transform: uppercase; font-weight: 800; border-bottom: 2px solid #10b981; padding-bottom: 4pt; margin-bottom: 12pt;">Experience</h2>
                        ${c}
                    </div>`;
            } else {
                // Standard Layout
                preview.innerHTML = `
                    <div style="text-align:center; border-bottom:1px solid #000; padding-bottom:10pt; margin-bottom:15pt;">
                        <h1 style="margin:0; font-size:22pt; font-weight:800;">${n.toUpperCase()}</h1>
                        <p style="font-size:10pt; font-weight:600; color:#444;">${l}</p>
                    </div>
                    <h2 style="font-size:11pt; text-transform:uppercase; border-bottom:1px solid #eee; margin-bottom:10pt;">Experience</h2>
                    ${c}`;
            }
        }
    </script>
</body>
</html>
